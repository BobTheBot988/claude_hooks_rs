name: Rust Multi-Binary Release

on:
  push:
    branches: [ "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. Cross-platform Rust Cache
    - name: Rust Cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    # 2. Build all binaries in release mode
    - name: Build
      run: cargo build --release --verbose

    # 3. Run your tests
    - name: Run tests
      run: cargo test --verbose

    # 4. Package all 3 binaries dynamically based on the OS
    - name: Package Binaries
      if: startsWith(github.ref, 'refs/tags/')
      shell: bash
      run: |
        mkdir -p staging
        
        # List your binary names here
        BINARIES=("post_hook" "pre_hook" "stop_hook")
        
        for bin in "${BINARIES[@]}"; do
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/release/${bin}.exe" "staging/${bin}-windows.exe"
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            cp "target/release/${bin}" "staging/${bin}-macos"
          else
            cp "target/release/${bin}" "staging/${bin}-linux"
          fi
        done

    # 5. Automatically Upload all packaged files to the GitHub Release
    - name: Create or Update Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true 
        files: staging/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
